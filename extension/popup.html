<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ProtoConsent</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/protoconsent_icon_32.png">
</head>
<body>
  <div id="popup-layout">
    <!-- Side panel: site declaration (hidden until data loads) -->
    <aside id="pc-side-panel" class="pc-side-panel" aria-label="Site declaration" aria-hidden="true">
      <div id="pc-site-declaration" class="pc-site-declaration"></div>
    </aside>

    <!-- Tab to toggle side panel (hidden until data loads) -->
    <button id="pc-side-tab" class="pc-side-tab" title="Site declaration" aria-label="Toggle site declaration panel" aria-expanded="false" aria-controls="pc-side-panel">
      <span class="pc-side-tab-icon" aria-hidden="true">ℹ</span>
      <span class="pc-side-tab-chevron" aria-hidden="true">◂</span>
    </button>

    <div id="popup-root">
      <h1 class="visually-hidden">ProtoConsent</h1>
      <header class="pc-header">
        <div class="pc-site">
          <div class="pc-site-label">Site</div>
          <div id="pc-site-domain" class="pc-site-domain">loading...</div>
        </div>
        <div class="pc-profile">
          <label for="pc-profile-select" class="pc-profile-label">Profile</label>
          <select id="pc-profile-select" class="pc-profile-select">
            <option value="strict">Strict</option>
            <option value="balanced" selected>Balanced</option>
            <option value="permissive">Permissive</option>
            <option value="custom" disabled hidden>Custom</option>
          </select>
        </div>
      </header>

      <div class="pc-header-stat">
        <button id="pc-blocked-count" class="pc-blocked-count" aria-expanded="false" aria-controls="pc-blocked-detail" aria-live="polite">loading...</button>
        <span id="pc-blocked-chevron" class="pc-blocked-chevron" aria-hidden="true"></span>
      </div>
      <div id="pc-blocked-detail" class="pc-blocked-detail is-collapsed"></div>
      <div id="pc-protection-scope" class="pc-protection-scope"></div>

      <main class="pc-main">
        <div id="pc-purposes-list" class="pc-purposes-list">
          <!-- Purposes will be injected here by popup.js -->
        </div>
      </main>

      <!-- Debug panel (hidden unless DEBUG_RULES = true in popup.js) -->
      <details id="pc-debug-panel" class="pc-debug-panel" hidden>
        <summary class="pc-debug-summary">Debug <button id="pc-debug-copy" class="pc-debug-copy" title="Copy to clipboard">Copy</button></summary>
        <div id="pc-debug-content" class="pc-debug-content"></div>
      </details>

      <footer class="pc-footer">
        <img src="icons/protoconsent_icon_32.png" alt="" class="pc-footer-icon" width="20" height="20">
        <div class="pc-footer-content">
          <span class="pc-footer-brand">ProtoConsent</span>
          <div class="pc-footer-links">
            <button class="pc-footer-link" id="pc-toggle-descriptions" aria-expanded="false">Show details</button>
            <a href="purposes-editor.html" class="pc-footer-link" id="pc-purposes-link">Purposes</a>
            <a href="https://protoconsent.org" class="pc-footer-link" target="_blank" rel="noopener noreferrer">
              Learn more
            </a>
          </div>
        </div>
      </footer>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
  <script src="well-known.js"></script>
  <script src="debug.js"></script>
</body>
</html>
