name: Directory update
on:
  issues:
    types: [opened, labeled]

jobs:
  add-site:
    if: contains(github.event.issue.labels.*.name, 'url-directory') && github.event.issue.state == 'open'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Parse domain from issue
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            // GitHub issue forms format: ### Domain\n\nvalue
            const match = body.match(/### Domain\s*\n\s*\n\s*(.+)/);
            if (!match) {
              core.setFailed('Could not parse domain from issue body');
              return;
            }
            let domain = match[1].trim().toLowerCase();
            // Strip protocol, path, and trailing slashes
            domain = domain.replace(/^https?:\/\//, '').replace(/\/.*$/, '').replace(/\/+$/, '');
            // Basic validation
            if (!/^[a-z0-9]([a-z0-9-]*[a-z0-9])?(\.[a-z0-9]([a-z0-9-]*[a-z0-9])?)+$/.test(domain)) {
              core.setFailed(`Invalid domain: ${domain}`);
              return;
            }
            core.setOutput('domain', domain);

      - name: Fetch and validate declaration
        id: validate
        if: steps.parse.outputs.domain
        uses: actions/github-script@v7
        with:
          script: |
            const https = require('https');
            const domain = '${{ steps.parse.outputs.domain }}';
            const url = `https://${domain}/.well-known/protoconsent.json`;

            const body = await new Promise((resolve, reject) => {
              const req = https.get(url, { timeout: 10000 }, (res) => {
                if (res.statusCode !== 200) {
                  reject(new Error(`HTTP ${res.statusCode}`));
                  return;
                }
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(data));
              });
              req.on('error', reject);
              req.on('timeout', () => { req.destroy(); reject(new Error('Timeout')); });
            });

            const json = JSON.parse(body);

            // Lightweight validation
            const KNOWN = ['functional','analytics','ads','personalization','third_parties','advanced_tracking'];
            if (!json.protoconsent || typeof json.protoconsent !== 'string') {
              core.setFailed('Missing or invalid "protoconsent" version field');
              return;
            }
            if (!json.purposes || typeof json.purposes !== 'object' || Array.isArray(json.purposes)) {
              core.setFailed('Missing or invalid "purposes" object');
              return;
            }
            const found = Object.keys(json.purposes).filter(k => KNOWN.includes(k));
            if (found.length === 0) {
              core.setFailed('No known purposes declared');
              return;
            }

            core.setOutput('version', json.protoconsent);
            core.setOutput('purposes', String(found.length));

      - name: Update sites.json
        if: steps.validate.outputs.version
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'docs/directory/sites.json';
            const domain = '${{ steps.parse.outputs.domain }}';
            const version = '${{ steps.validate.outputs.version }}';
            const purposes = parseInt('${{ steps.validate.outputs.purposes }}', 10);
            const today = new Date().toISOString().slice(0, 10);

            const data = JSON.parse(fs.readFileSync(path, 'utf8'));

            // Check for duplicates
            if (data.sites.some(s => s.domain === domain)) {
              // Update existing entry
              const entry = data.sites.find(s => s.domain === domain);
              entry.version = version;
              entry.purposes = purposes;
              entry.last_checked = today;
            } else {
              // Add new entry
              data.sites.push({
                domain,
                added: today,
                version,
                purposes,
                last_checked: today
              });
            }

            data.last_updated = today;
            fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');

      - name: Create PR
        if: steps.validate.outputs.version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="directory/add-$(echo '${{ steps.parse.outputs.domain }}' | tr '.' '-')-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH"
          git add docs/directory/sites.json
          git commit -m "directory: add ${{ steps.parse.outputs.domain }}"
          git push --force origin "$BRANCH"
          gh pr create \
            --title "directory: add ${{ steps.parse.outputs.domain }}" \
            --body "Adds **${{ steps.parse.outputs.domain }}** to the [site directory](https://protoconsent.org/directory.html).\n\nProtocol version: ${{ steps.validate.outputs.version }} | Purposes: ${{ steps.validate.outputs.purposes }}\n\nCloses #${{ github.event.issue.number }}" \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on issue
        if: steps.validate.outputs.version
        uses: actions/github-script@v7
        with:
          script: |
            const domain = '${{ steps.parse.outputs.domain }}';
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `**${domain}** validated successfully.\n\nProtocol version: ${`${{ steps.validate.outputs.version }}`} | Purposes: ${`${{ steps.validate.outputs.purposes }}`}\n\nA pull request has been created to add it to the directory. It will appear on [protoconsent.org/directory](https://protoconsent.org/directory.html) once merged.\n\nThank you for supporting open consent on the web!`
            });

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const domain = '${{ steps.parse.outputs.domain }}' || '(could not parse)';
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `Could not validate **${domain}**.\n\nPlease make sure:\n- The domain serves \`https://${domain}/.well-known/protoconsent.json\` over HTTPS\n- The file contains a valid ProtoConsent declaration (version field + purposes object)\n- You can check your file at [protoconsent.org/validate.html](https://protoconsent.org/validate.html)\n\nFix the issue and open a new submission when ready.`
            });
